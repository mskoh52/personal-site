<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A shared launch page for two static web applications." />
    <title>Application Index</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <main>
      <header class="masthead">
        <a class="wordmark" href="/" aria-label="Application Index home">INDEX<span>•</span></a>
        <p class="availability"><span></span> {{APP_COUNT}} applications online</p>
      </header>

      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Shared digital workspace</p>
        <h1 id="page-title">Choose where<br />you want to go.</h1>
        <p class="intro__copy">Two independent web experiences, collected behind one simple front door.</p>
      </section>

      <section class="app-grid" aria-label="Applications">
        {{APP_CARDS}}
      </section>

      <footer>
        <p>One address. Two destinations.</p>
        <p>Hosted on Netlify</p>
      </footer>
    </main>
  </body>
</html>
